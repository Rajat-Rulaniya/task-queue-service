services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: job_service
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      MONGODB_URL: mongodb://admin:password@mongodb:27017
      MONGODB_DB: job_service
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  worker:
    build: .
    environment:
      DEBUG: "True"
      MONGODB_URL: mongodb://admin:password@mongodb:27017
      MONGODB_DB: job_service
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/1
    depends_on:
      - redis
      - mongodb
      - server
    command: celery -A worker worker --loglevel=info -c 4
    volumes:
      - .:/app

volumes:
  mongodb_data:
