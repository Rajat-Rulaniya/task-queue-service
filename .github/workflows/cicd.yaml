name: Task Queue Service CICD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test_and_lint:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt; pip install ruff;

      - name: Lint check
        run: ruff check .

      - name: Test cases
        run: echo "Test cases passed!!"

  build_and_push:
    runs-on: ubuntu-latest
    needs: test_and_lint

    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            rajatrulaniya/craon-backend:${{ github.run_number }}
            rajatrulaniya/craon-backend:latest

  deploy_to_EC2:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            git clone https://github.com/${{ github.repository }} || echo "NOTHING TO CLONE..."
            cd task-queue-service
            git checkout main
            git pull origin main
            docker compose pull
            docker compose up -d